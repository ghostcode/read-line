<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      text-align: center;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .row label { font-size: 13px; }

    /* 开关 */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .switch input { display: none; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .switch .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: #44bd32; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* 颜色选择 */
    .colors {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-btn:hover, .color-btn.active { border-color: #333; }

    /* 线型选择 */
    .line-types {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .lt-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 4px 6px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      color: #666;
      transition: border-color 0.15s, background 0.15s;
    }
    .lt-btn:hover { border-color: #aaa; }
    .lt-btn.active {
      border-color: #44bd32;
      background: #f0fff4;
      color: #44bd32;
    }
    .lt-preview {
      width: 48px;
      height: 12px;
    }

    /* 滑块 */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .slider-row label { font-size: 13px; white-space: nowrap; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .val {
      font-size: 12px;
      color: #666;
      width: 20px;
      text-align: right;
    }

    hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }

    /* 隐藏网站区域 */
    .blacklist-section { margin-top: 4px; }
    .blacklist-hint {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-bottom: 8px;
    }
    .bl-btn {
      display: block;
      width: 100%;
      padding: 7px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: background 0.15s, border-color 0.15s;
    }
    .bl-btn:hover { background: #eee; border-color: #bbb; }
    .bl-btn.is-on {
      background: #fff0f0;
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .bl-list {
      margin-top: 8px;
      max-height: 120px;
      overflow-y: auto;
    }
    .bl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      font-size: 12px;
      color: #555;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .bl-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 190px;
    }
    .bl-remove {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
    }
    .bl-empty {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      padding: 8px 0;
    }
    .section-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Read-Line 设置</h2>

  <div class="row">
    <label>启用阅读线</label>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <div class="row" style="margin-bottom:8px;">
    <label>线条颜色</label>
  </div>
  <div class="colors" id="colorList"></div>

  <div class="row" style="margin-bottom:8px;">
    <label>线条类型</label>
  </div>
  <div class="line-types" id="lineTypeList">
    <button class="lt-btn" data-type="solid">
      <svg class="lt-preview" viewBox="0 0 48 12">
        <line x1="2" y1="6" x2="46" y2="6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      </svg>
      实线
    </button>
    <button class="lt-btn" data-type="dashed">
      <svg class="lt-preview" viewBox="0 0 48 12">
        <line x1="2" y1="6" x2="46" y2="6" stroke="#333" stroke-width="2"
              stroke-linecap="round" stroke-dasharray="6,3"/>
      </svg>
      虚线
    </button>
    <button class="lt-btn" data-type="wavy">
      <svg class="lt-preview" viewBox="0 0 48 12">
        <path d="M2 6 Q8 3 14 6 Q20 9 26 6 Q32 3 38 6 Q44 9 46 8"
              stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      波浪
    </button>
  </div>

  <div class="slider-row">
    <label>线宽</label>
    <input type="range" id="thickness" min="1" max="6" step="1">
    <span class="val" id="thicknessVal">2</span>
  </div>

  <hr>

  <div class="blacklist-section">
    <div class="blacklist-hint" id="currentSite">当前网站：加载中…</div>
    <button class="bl-btn" id="blToggleBtn">禁止此网站显示阅读线</button>
    <div class="section-title" style="margin-top:12px;">不显示辅助线的网站</div>
    <div class="bl-list" id="blList"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
